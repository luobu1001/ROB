<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式 - 罗布设计工作室</title>
    <link rel="icon" type="image/png" href="LOGO.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-color: #333;
            --secondary-color: #666;
            --accent-color: #8B7355;
            --light-color: #f5f5f5;
            --white: #ffffff;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--primary-color);
            background-color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }
        
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #6d5a3f;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 w-full bg-white bg-opacity-95 z-50 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="LOGO.png" alt="罗布设计工作室" class="h-10">
                <span class="ml-3 text-xl font-medium">罗布设计工作室</span>
            </a>
            
            <!-- 桌面导航 -->
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="nav-link">首页</a>
                <a href="projects.html" class="nav-link">作品展示</a>
                <a href="services.html" class="nav-link">服务内容</a>
                <a href="about.html" class="nav-link">关于我们</a>
                <a href="contact.html" class="nav-link active">联系方式</a>
            </div>
            
            <!-- 移动端菜单按钮 -->
            <button id="menu-toggle" class="md:hidden text-gray-800 focus:outline-none">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
        
        <!-- 移动端导航菜单 -->
        <div id="mobile-menu" class="md:hidden bg-white hidden">
            <div class="container mx-auto px-4 py-2 flex flex-col space-y-3">
                <a href="index.html" class="py-2 mobile-nav-link">首页</a>
                <a href="projects.html" class="py-2 mobile-nav-link">作品展示</a>
                <a href="services.html" class="py-2 mobile-nav-link">服务内容</a>
                <a href="about.html" class="py-2 mobile-nav-link">关于我们</a>
                <a href="contact.html" class="py-2 mobile-nav-link">联系方式</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="pt-32 pb-16 bg-gray-50">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl font-light text-center fade-in">联系我们</h1>
            <p class="text-gray-600 text-center mt-4 fade-in">期待与您的沟通，共同打造理想家园</p>
        </div>
    </section>

    <!-- 联系方式 -->
    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="fade-in">
                    <h3 class="text-xl font-medium mb-6">预约咨询</h3>
                    <form id="contact-form" class="space-y-6">
                        <div>
                            <label for="name" class="block text-gray-700 mb-2">姓名</label>
                            <input type="text" id="name" class="w-full px-4 py-2 border border-gray-300 focus:outline-none focus:border-accent-color">
                        </div>
                        
                        <div>
                            <label for="phone" class="block text-gray-700 mb-2">电话</label>
                            <input type="tel" id="phone" class="w-full px-4 py-2 border border-gray-300 focus:outline-none focus:border-accent-color">
                        </div>
                        
                        <div>
                            <label for="email" class="block text-gray-700 mb-2">邮箱</label>
                            <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 focus:outline-none focus:border-accent-color">
                        </div>
                        
                        <div>
                            <label for="message" class="block text-gray-700 mb-2">留言</label>
                            <textarea id="message" rows="4" class="w-full px-4 py-2 border border-gray-300 focus:outline-none focus:border-accent-color"></textarea>
                        </div>
                        
                        <button type="submit" class="bg-accent-color text-white px-6 py-3 hover:bg-opacity-90 transition duration-300">提交</button>
                    </form>
                </div>
                
                <div class="fade-in">
                    <h3 class="text-xl font-medium mb-6">联系方式</h3>
                    <div class="space-y-6">
                        <div class="flex items-start">
                            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center mr-4 flex-shrink-0">
                                <i class="fas fa-map-marker-alt text-accent-color"></i>
                            </div>
                            <div>
                                <h4 class="font-medium mb-1">地址</h4>
                                <p class="text-gray-600">宜章县尚书广场对面</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start">
                            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center mr-4 flex-shrink-0">
                                <i class="fas fa-phone-alt text-accent-color"></i>
                            </div>
                            <div>
                                <h4 class="font-medium mb-1">电话</h4>
                                <p class="text-gray-600">16680997999</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start">
                            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center mr-4 flex-shrink-0">
                                <i class="fas fa-envelope text-accent-color"></i>
                            </div>
                            <div>
                                <h4 class="font-medium mb-1">邮箱</h4>
                                <p class="text-gray-600">45570563@qq.com</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start">
                            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center mr-4 flex-shrink-0">
                                <i class="fas fa-clock text-accent-color"></i>
                            </div>
                            <div>
                                <h4 class="font-medium mb-1">工作时间</h4>
                                <p class="text-gray-600">周一至周日 9:00-18:00</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-12">
                        <h3 class="text-xl font-medium mb-6">关注我们</h3>
                        <div class="flex space-x-4">
                            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-accent-color hover:text-white transition duration-300">
                                <i class="fab fa-weixin"></i>
                            </a>
                            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-accent-color hover:text-white transition duration-300">
                                <i class="fab fa-weibo"></i>
                            </a>
                            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-accent-color hover:text-white transition duration-300">
                                <i class="fab fa-instagram"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="py-12 bg-gray-100">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <img src="LOGO.png" alt="罗布设计工作室" class="h-8">
                </div>
                
                <div class="text-gray-600 text-sm">
                    <p>© 2026 罗布设计工作室. 保留所有权利.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // 初始化GSAP ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);
        
        // 页面加载动画
        window.addEventListener('load', function() {
            const fadeElements = document.querySelectorAll('.fade-in');
            fadeElements.forEach(element => {
                ScrollTrigger.create({
                    trigger: element,
                    start: 'top 80%',
                    onEnter: () => element.classList.add('visible'),
                    once: true
                });
            });
        });
        
        // 移动端菜单
        document.getElementById('menu-toggle').addEventListener('click', function() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        });
        
        // 移动端导航链接点击
        document.querySelectorAll('.mobile-nav-link').forEach(link => {
            link.addEventListener('click', function() {
                document.getElementById('mobile-menu').classList.add('hidden');
            });
        });
        
        // 表单提交
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            
            // 简单验证
            if (!name || !phone) {
                alert('请填写姓名和电话');
                return;
            }
            
            // 模拟表单提交
            alert('感谢您的咨询，我们会尽快与您联系！');
            this.reset();
        });
    </script>
</body>
</html>
