<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗布设计工作室 - 专注私宅家装全案设计</title>
    <link rel="icon" type="image/png" href="LOGO.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-color: #333;
            --secondary-color: #666;
            --accent-color: #8B7355;
            --light-color: #f5f5f5;
            --white: #ffffff;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--primary-color);
            background-color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }
        
        .project-card {
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }
        
        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
        }
        
        .service-card {
            transition: transform 0.3s ease;
        }
        
        .service-card:hover {
            transform: translateY(-5px);
        }
        
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .hero-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3));
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #6d5a3f;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 w-full bg-white bg-opacity-95 z-50 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="LOGO.png" alt="罗布设计工作室" class="h-10">
                <span class="ml-3 text-xl font-medium">罗布设计工作室</span>
            </a>
            
            <!-- 桌面导航 -->
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="nav-link active">首页</a>
                <a href="projects.html" class="nav-link">作品展示</a>
                <a href="services.html" class="nav-link">服务内容</a>
                <a href="about.html" class="nav-link">关于我们</a>
                <a href="contact.html" class="nav-link">联系方式</a>
            </div>
            
            <!-- 移动端菜单按钮 -->
            <button id="menu-toggle" class="md:hidden text-gray-800 focus:outline-none">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
        
        <!-- 移动端导航菜单 -->
        <div id="mobile-menu" class="md:hidden bg-white hidden">
            <div class="container mx-auto px-4 py-2 flex flex-col space-y-3">
                <a href="index.html" class="py-2 mobile-nav-link">首页</a>
                <a href="projects.html" class="py-2 mobile-nav-link">作品展示</a>
                <a href="services.html" class="py-2 mobile-nav-link">服务内容</a>
                <a href="about.html" class="py-2 mobile-nav-link">关于我们</a>
                <a href="contact.html" class="py-2 mobile-nav-link">联系方式</a>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="h-screen flex items-center justify-center hero-bg" style="background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/326a577c264f43e9989973f48172a407~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260429132723FA45EFCF2D8C0AACAB31&rrcfp=f06b921b&x-expires=1780032472&x-signature=Rko%2F9gjyKMJM1QyHyRnEGBlO7KQ%3D');">
        <div class="container mx-auto px-4 text-center text-white">
            <h1 class="text-4xl md:text-6xl font-light mb-6 opacity-0" id="hero-title">罗布设计工作室</h1>
            <p class="text-xl md:text-2xl font-light mb-10 max-w-2xl mx-auto opacity-0" id="hero-subtitle">专注私宅家装全案设计，打造有温度的理想家</p>
            <a href="projects.html" class="inline-block border border-white px-8 py-3 text-white hover:bg-white hover:text-gray-800 transition duration-300 opacity-0" id="hero-btn">查看作品</a>
        </div>
    </section>

    <!-- 关于我们简介 -->
    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl mx-auto text-center fade-in">
                <h2 class="text-3xl font-light mb-8">不做套路模板，坚持一户一设计</h2>
                <p class="text-gray-600 mb-6">罗布设计工作室专注私宅家装全案设计，深耕家装领域多年，以实用为基础、审美为核心、落地为根本，将您的居住习惯、审美喜好融入每一寸空间。</p>
                <p class="text-gray-600">我们主营毛坯新房装修、二手房翻新、老房改造、精装房软装升级，覆盖小户型、大平层、复式等各类居家空间设计。</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="py-12 bg-gray-100">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <img src="LOGO.png" alt="罗布设计工作室" class="h-8">
                </div>
                
                <div class="text-gray-600 text-sm">
                    <p>© 2026 罗布设计工作室. 保留所有权利.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // 初始化GSAP ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);
        
        // 页面加载动画
        window.addEventListener('load', function() {
            // Hero区域动画
            gsap.to('#hero-title', {opacity: 1, y: 0, duration: 1, delay: 0.2});
            gsap.to('#hero-subtitle', {opacity: 1, y: 0, duration: 1, delay: 0.5});
            gsap.to('#hero-btn', {opacity: 1, y: 0, duration: 1, delay: 0.8});
            
            // 滚动动画
            const fadeElements = document.querySelectorAll('.fade-in');
            fadeElements.forEach(element => {
                ScrollTrigger.create({
                    trigger: element,
                    start: 'top 80%',
                    onEnter: () => element.classList.add('visible'),
                    once: true
                });
            });
        });
        
        // 移动端菜单
        document.getElementById('menu-toggle').addEventListener('click', function() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        });
        
        // 移动端导航链接点击
        document.querySelectorAll('.mobile-nav-link').forEach(link => {
            link.addEventListener('click', function() {
                document.getElementById('mobile-menu').classList.add('hidden');
            });
        });
    </script>
</body>
</html>
